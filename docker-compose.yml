version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: barberia-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: barberia
      POSTGRES_USER: barber
      POSTGRES_PASSWORD: barber123
    ports:
      - "5432:5432"
    volumes:
      - barberia_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: barberia-app
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgresql://barber:barber123@db:5432/barberia
      ADMIN_EMAIL: admin@barberia.com
      ADMIN_PASSWORD: admin123
      JWT_SECRET: super-secreto-local-32-caracteres-mínimo
      RESEND_API_KEY: re_placeholder
      FROM_EMAIL: reservas@barberia.com
      TURNSTILE_SECRET_KEY: "1x00000000000000000000AA"
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: "1x00000000000000000000AA"
      TIMEZONE: America/Mexico_City
      PORT: "3100"
    depends_on:
      db:
        condition: service_healthy

volumes:
  barberia_data: